# =============================================================================
# GitHub Actions - Continuous Integration (CI)
# =============================================================================
# File        : ms-wallet-ci.yml
# Project     : MSIMPL - Microservices Platform
# Service     : ms-wallet
# Purpose     : Verify workflow, checkout repository and configure JDK 17.
# Environment : GitHub Actions
# Version     : 1.3.0
# =============================================================================

name: Wallet CI Workflow

on:
  push:
    branches:
      - main

    paths:
      - "ms-wallet/**"
      - ".github/workflows/ms-wallet-ci.yml"

jobs:

  workflow-verification:

    name: Verify GitHub Actions

    runs-on: ubuntu-latest

    steps:

      # --------------------------------------------------------
      # Step 1
      # Checkout Repository
      # --------------------------------------------------------

      - name: Checkout Repository
        uses: actions/checkout@v4

      # --------------------------------------------------------
      # Step 2
      # Setup Java 17
      # --------------------------------------------------------

      - name: Setup JDK 17

        uses: actions/setup-java@v4

        with:
          distribution: temurin
          java-version: '17'

      # --------------------------------------------------------
      # Step 3
      # Verify Java Installation
      # --------------------------------------------------------

      - name: Verify Java Installation

        run: |
          java -version
          javac -version

      # --------------------------------------------------------
      # Step 4
      # Display Workflow Status
      # --------------------------------------------------------

      - name: Display Workflow Status

        run: |
          echo "===================================================="
          echo "MSIMPL - GitHub Actions"
          echo "Service : ms-wallet"
          echo "JDK     : 17"
          echo "Status  : Java environment configured successfully."
          echo "===================================================="