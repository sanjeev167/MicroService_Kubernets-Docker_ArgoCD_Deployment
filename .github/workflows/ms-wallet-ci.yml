# =============================================================================
# GitHub Actions - Continuous Integration (CI)
# =============================================================================
# File        : ms-wallet-ci.yml
# Project     : MSIMPL - Microservices Platform
# Service     : ms-wallet
#
# Description
# -----------------------------------------------------------------------------
# This workflow performs Continuous Integration (CI) for the ms-wallet
# microservice.
#
# Activities Performed
# --------------------
# 1. Checkout source code
# 2. Configure JDK 17
# 3. Verify Java installation
# 4. Generate Docker image tag (v<project.version>-<git-short-sha>)
# 5. Cache Maven dependencies
# 6. Build Spring Boot application
# 7. Verify generated JAR
# 8. Upload build artifact
# 9. Login to Docker Hub
# 10. Configure Docker Buildx
# 11. Cache Docker build layers
# 12. Build Docker image
# 13. Verify Docker image
# 14. Display workflow summary
#
# Image Tag Format
# ----------------
# v<project.version>-<git-short-sha>
#
# Example:
# v1.0.0-8af34bc
#
# NOTE:
# Docker image push will be added in the next enhancement step.
#
# Environment : GitHub Actions
# JDK         : Temurin 17
# Runner      : ubuntu-latest
# Version     : 2.1.0
# Author      : Sanjeev Kumar
# =============================================================================

name: Wallet CI Workflow

run-name: Build & Package ms-wallet

on:
  push:
    branches:
      - main
    paths:
      - "ms-wallet/**"
      - ".github/workflows/ms-wallet-ci.yml"

permissions:
  contents: read

concurrency:
  group: wallet-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-package:

    name: Build, Package & Verify

    runs-on: ubuntu-latest

    timeout-minutes: 20

    defaults:
      run:
        working-directory: ms-wallet

    steps:

      # --------------------------------------------------------
      # Step 1 - Checkout Repository
      # --------------------------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # --------------------------------------------------------
      # Step 2 - Setup Java 17
      # --------------------------------------------------------
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # --------------------------------------------------------
      # Step 3 - Verify Java Installation
      # --------------------------------------------------------
      - name: Verify Java Installation
        run: |
          java -version
          javac -version

      # --------------------------------------------------------
      # Step 4 - Generate Docker Image Tag
      # Format : v<project.version>-<git-short-sha>
      # --------------------------------------------------------
      - name: Generate Docker Image Tag
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          SHORT_SHA=$(git rev-parse --short HEAD)
          IMAGE_TAG="v${VERSION}-${SHORT_SHA}"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
          echo "Generated Image Tag : ${IMAGE_TAG}"

      # --------------------------------------------------------
      # Step 5 - Cache Maven Dependencies
      # --------------------------------------------------------
      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # --------------------------------------------------------
      # Step 6 - Build Spring Boot Application
      # --------------------------------------------------------
      - name: Build Spring Boot Application
        run: mvn clean install -DskipTests

      # --------------------------------------------------------
      # Step 7 - Verify Build Artifact
      # --------------------------------------------------------
      - name: Verify Build Artifact
        run: |
          echo "Generated Build Artifacts"
          ls -lh target

      # --------------------------------------------------------
      # Step 8 - Upload Build Artifact
      # --------------------------------------------------------
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ms-wallet-jar
          path: ms-wallet/target/*.jar

      # --------------------------------------------------------
      # Step 9 - Login to Docker Hub
      # Required Secrets:
      # DOCKER_USERNAME
      # DOCKER_TOKEN
      # --------------------------------------------------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # --------------------------------------------------------
      # Step 10 - Setup Docker Buildx
      # --------------------------------------------------------
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --------------------------------------------------------
      # Step 11 - Cache Docker Build Layers
      # --------------------------------------------------------
      - name: Cache Docker Layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # --------------------------------------------------------
      # Step 12 - Build Docker Image
      # --------------------------------------------------------
      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/ms-wallet:${IMAGE_TAG} \
            .

      # --------------------------------------------------------
      # Step 13 - Verify Docker Image
      # --------------------------------------------------------
      - name: Verify Docker Image
        run: |
          docker images ${{ secrets.DOCKER_USERNAME }}/ms-wallet

      
      
      # --------------------------------------------------------
      # Step 14
      # Push Docker Image
      #
      # Pushes the generated Docker image to Docker Hub.
      #
      # Image Tag Format
      # ----------------
      # v<project.version>-<git-short-sha>
      #
      # Example:
      # v1.0.0-8af34bc
      # --------------------------------------------------------

      - name: Push Docker Image

        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ms-wallet:${IMAGE_TAG}
          
          
      # --------------------------------------------------------
      # Step 15
      # Verify Docker Push
      #
      # Displays the Docker image details that were pushed to
      # Docker Hub.
      # --------------------------------------------------------

      - name: Verify Docker Push

        run: |
          echo "======================================================="
          echo "Docker Image Successfully Published"
          echo "Repository : ${{ secrets.DOCKER_USERNAME }}/ms-wallet"
          echo "Image Tag  : ${IMAGE_TAG}"
          echo "======================================================="     
          
      # --------------------------------------------------------
      # Step 16
      # Display Workflow Summary
      # --------------------------------------------------------

      - name: Display Workflow Summary

        run: |
          echo "======================================================="
          echo "MSIMPL - Continuous Integration"
          echo "======================================================="
          echo "Service        : ms-wallet"
          echo "JDK            : Temurin 17"
          echo "Build          : SUCCESS"
          echo "Artifact       : JAR Generated"
          echo "Docker Image   : Built Successfully"
          echo "Image Tag      : ${IMAGE_TAG}"
          echo "Registry       : Docker Hub"
          echo "Docker Push    : SUCCESS"
          echo "Status         : Ready for Argo CD"
          echo "======================================================="
          
          
     