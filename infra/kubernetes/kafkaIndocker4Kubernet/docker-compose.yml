# =============================================================================
# File Name   : docker-compose.yml
# Module      : Kubernetes Infrastructure
# Environment : Kubernetes Infrastructure
# Project     : Microservices Platform (MSIMPL)
# Author      : Sanjeev Kumar
# Created On  : 04-Jul-2026
# Last Updated: 07-Jul-2026
# Version     : 1.1.0
# =============================================================================
#
# Description
# -----------
# Docker infrastructure for the MSIMPL Kubernetes
# development environment.
#
# This compose file provisions the common infrastructure
# required by Spring Boot microservices deployed inside
# the local Kubernetes cluster.
#
#
# Deployment Architecture
# -----------------------
#
# Kafka Runtime
#
# ✔ Docker Desktop
#
# Spring Boot Runtime
#
# ✔ Kubernetes Cluster
#
#
# Infrastructure Components
# -------------------------
#
# • Apache Kafka (KRaft Mode)
# • Kafka UI
#
#
# Notes
# -----
#
# PostgreSQL executes on the Windows host.
#
# Kafka executes inside Docker Desktop.
#
# Spring Boot microservices execute inside Kubernetes.
#
# Kafka is configured to advertise
#
#     host.docker.internal:9092
#
# allowing Kubernetes Pods to connect successfully to the
# Docker-hosted Kafka broker.
#
# Runtime configuration is externalized into:
#
#     env/kafka.env
#
# =============================================================================

version: "3.8"

services:

  # ==========================================================
  # APACHE KAFKA (KRaft Mode)
  # ==========================================================
  #
  # Provides the messaging infrastructure consumed by
  # Kubernetes-deployed Spring Boot microservices.
  #
  # Although Kafka executes inside Docker Desktop,
  # it advertises the Docker host address so that
  # Kubernetes Pods can connect successfully.
  #
  # ==========================================================

  kafka:

    image: confluentinc/cp-kafka:7.5.0

    container_name: kafka

    hostname: kafka

    ports:
      - "9092:9092"

    # --------------------------------------------------------
    # Environment Variables
    # --------------------------------------------------------
    #
    # Kafka runtime configuration is centralized in:
    #
    #     env/kafka.env
    #
    # This Kubernetes-specific configuration advertises
    # host.docker.internal to Kubernetes Pods.
    #
    # --------------------------------------------------------

    env_file:
      - ./env/kafka.env

    environment:

      # ------------------------------------------------------
      # Static Kafka Configuration
      # ------------------------------------------------------

      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

    networks:
      - infra_msimpl-network

    restart: unless-stopped



  # ==========================================================
  # KAFKA UI
  # ==========================================================
  #
  # Web interface for monitoring and managing the
  # Docker-hosted Kafka broker.
  #
  # Kafka UI communicates with Kafka through the
  # internal Docker bridge network using:
  #
  #     kafka:9092
  #
  # This hostname is only used internally between
  # Docker containers.
  #
  # Kubernetes Pods communicate with Kafka using:
  #
  #     host.docker.internal:9092
  #
  # ==========================================================

  kafka-ui:

    image: provectuslabs/kafka-ui

    container_name: kafka-ui

    hostname: kafka-ui

    ports:
      - "8085:8080"

    environment:

      KAFKA_CLUSTERS_0_NAME: Local

      #
      # Internal Docker communication only.
      #
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

    depends_on:
      - kafka

    networks:
      - infra_msimpl-network

    restart: unless-stopped



# ==========================================================
# NETWORK CONFIGURATION
# ==========================================================
#
# Shared Docker bridge network used only by the Docker
# infrastructure containers.
#
# This network is NOT accessible from Kubernetes Pods.
#
# Kubernetes Pods access Kafka through:
#
#     host.docker.internal:9092
#
# as configured in env/kafka.env.
#
# ==========================================================

networks:

  infra_msimpl-network:

    name: infra_msimpl-network

    driver: bridge