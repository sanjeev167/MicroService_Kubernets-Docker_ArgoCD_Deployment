# ============================================================================
# MSIMPL - Kubernetes Service Configuration
#
# File        : ms-notification-service.yaml
# Service     : ms-notification
# Environment : Kubernetes
# Author      : Sanjeev Kumar
#
# Description
# -----------
# This file creates a Kubernetes Service for the ms-notification
# microservice.
#
# A Service provides a stable network endpoint for one or more Pods.
# Pods are temporary resources whose names and IP addresses change whenever
# they are recreated (during rolling updates, failures, scaling, etc.).
#
# Instead of communicating directly with Pod IP addresses, other
# microservices communicate with this Service.
#
# Example:
#     http://ms-notification:8081
#
# Kubernetes automatically forwards the request to one of the healthy
# Notification Pods.
#
# This Service uses the ClusterIP type because ms-notification is an internal
# microservice. It is intended to be consumed only by other services inside
# the Kubernetes cluster and is not exposed directly to external clients.
# ============================================================================

# ============================================================================
# Request Flow
# ============================================================================
# Transaction Orchestrator
# │
# ▼
# http://ms-notification:8081
# │
# ▼
# Kubernetes Service (ClusterIP)
# │
# ▼
# Notification Pod(s)
# │
# ▼
# Spring Boot Application
# ============================================================================

# ============================================================================
# Port Flow
# ============================================================================
# Spring Boot Application
# │
# ▼
# server.port = 8081
# │
# ▼
# Container Port (8081)
# │
# ▼
# targetPort (8081)
# │
# ▼
# Service Port (8081)
# │
# ▼
# Other Microservices
# ============================================================================

# ----------------------------------------------------------------------------
# Kubernetes API version.
# ----------------------------------------------------------------------------
apiVersion: v1

# ----------------------------------------------------------------------------
# Specifies that this resource is a Kubernetes Service.
# ----------------------------------------------------------------------------
kind: Service

metadata:

  # --------------------------------------------------------------------------
  # Name of the Service.
  # --------------------------------------------------------------------------
  name: ms-notification

  # --------------------------------------------------------------------------
  # Namespace where this Service will be created.
  # --------------------------------------------------------------------------
  namespace: msimpl

spec:

  # --------------------------------------------------------------------------
  # Service Type
  # --------------------------------------------------------------------------
  type: ClusterIP

  # --------------------------------------------------------------------------
  # Service Selector
  # --------------------------------------------------------------------------
  selector:
    app: ms-notification

  # --------------------------------------------------------------------------
  # Port Configuration
  # --------------------------------------------------------------------------
  ports:
    - protocol: TCP

      # ----------------------------------------------------------------------
      # Service Port
      # ----------------------------------------------------------------------
      port: 8081

      # ----------------------------------------------------------------------
      # Target Port
      # ----------------------------------------------------------------------
      targetPort: 8081

# ============================================================================
# Complete Networking Flow
# ============================================================================
# Transaction Orchestrator
# │
# ▼
# http://ms-notification:8081
# │
# ▼
# CoreDNS resolves "ms-notification"
# │
# ▼
# ClusterIP
# │
# ▼
# Kubernetes Service
# │
# ▼
# Notification Pod (Selected by label: app=ms-notification)
# │
# ▼
# Spring Boot Application (Port 8081)
# ============================================================================

# ============================================================================
# Why Both port and targetPort are 8081?
# ============================================================================
# Keeping both values as 8081 provides a clean and consistent configuration.
#
# Client Application
# │
# ▼
# Service Port      : 8081
# │
# ▼
# Target Port       : 8081
# │
# ▼
# Spring Boot Port  : 8081
#
# Although Kubernetes allows different values (for example, Service Port 80
# forwarding to Target Port 8081), using the same port number simplifies
# configuration and troubleshooting for internal microservice communication.
# ============================================================================

# ============================================================================
# MSIMPL Best Practice
# ============================================================================
# ✔ Use ClusterIP for all internal microservices.
# ✔ Access services using DNS names instead of Pod IP addresses.
# ✔ Keep Service port and targetPort consistent unless translation is required.
# ✔ Ensure the selector exactly matches the labels defined in the Deployment.
# ✔ Never hardcode Pod IP addresses in application configuration.
# ============================================================================